name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: sapi
          POSTGRES_PASSWORD: sapi_secret
          POSTGRES_DB: sapi_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sapi -d sapi_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Initialize database schema
        env:
          DATABASE_URL: postgresql://sapi:sapi_secret@localhost:5432/sapi_db
          DATABASE_URL_DIRECT: postgresql://sapi:sapi_secret@localhost:5432/sapi_db
          PGPASSWORD: sapi_secret
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          for f in docker/initdb/*.sql; do
            psql -h localhost -U sapi -d sapi_db -f "$f"
          done

      - name: Format check
        run: black --check src app tests

      - name: Lint
        run: flake8 src app tests --max-line-length=100 --extend-ignore=E203,W503

      - name: Run tests
        env:
          DATABASE_URL: postgresql://sapi:sapi_secret@localhost:5432/sapi_db
          DATABASE_URL_DIRECT: postgresql://sapi:sapi_secret@localhost:5432/sapi_db
        run: pytest
